<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent Harness - 智能体管理平台</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            height: 100vh;
            overflow: hidden;
        }
        .app-container { display: flex; height: 100vh; }
        .sidebar { width: 280px; background: #1e293b; border-right: 1px solid #334155; display: flex; flex-direction: column; }
        .sidebar-header { padding: 20px; border-bottom: 1px solid #334155; }
        .sidebar-header h1 { font-size: 20px; color: #38bdf8; }
        .sidebar-header .subtitle { font-size: 12px; color: #64748b; margin-top: 4px; }
        .sidebar-section { padding: 12px; border-bottom: 1px solid #334155; }
        .sidebar-section-title { font-size: 11px; color: #64748b; text-transform: uppercase; margin-bottom: 8px; }
        .project-item { padding: 10px 12px; border-radius: 6px; cursor: pointer; margin-bottom: 4px; transition: background 0.2s; }
        .project-item:hover { background: #334155; }
        .project-item.active { background: #38bdf8; color: #0f172a; }
        .project-item .name { font-size: 14px; font-weight: 500; display: flex; justify-content: space-between; align-items: center; }
        .project-item .meta { font-size: 11px; opacity: 0.7; margin-top: 2px; }
        .project-item .actions { display: none; gap: 4px; }
        .project-item:hover .actions { display: flex; }
        .project-item.active .actions { display: flex; }
        .project-item .actions button { background: transparent; border: none; color: inherit; cursor: pointer; padding: 2px 4px; border-radius: 3px; font-size: 11px; }
        .project-item .actions button:hover { background: rgba(0,0,0,0.2); }
        .project-item .actions .delete-btn:hover { background: #ef4444; color: #fff; }
        .btn { padding: 8px 16px; border-radius: 6px; border: none; cursor: pointer; font-size: 14px; transition: all 0.2s; }
        .btn-primary { background: #38bdf8; color: #0f172a; }
        .btn-primary:hover { background: #0ea5e9; }
        .btn-secondary { background: #334155; color: #e2e8f0; }
        .btn-secondary:hover { background: #475569; }
        .btn-danger { background: #ef4444; color: #fff; }
        .btn-danger:hover { background: #dc2626; }
        .btn-small { padding: 4px 10px; font-size: 12px; }
        .btn-add { width: 100%; padding: 10px; background: transparent; border: 1px dashed #334155; color: #64748b; border-radius: 6px; cursor: pointer; font-size: 13px; margin-top: 8px; }
        .btn-add:hover { border-color: #38bdf8; color: #38bdf8; }
        .main-content { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .top-bar { padding: 16px 24px; border-bottom: 1px solid #334155; display: flex; justify-content: space-between; align-items: center; }
        .current-project { font-size: 16px; font-weight: 600; color: #f1f5f9; }
        .current-project .orchestrator-badge { font-size: 11px; background: #8b5cf6; color: #fff; padding: 2px 8px; border-radius: 4px; margin-left: 8px; }
        .chat-container { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .chat-messages { flex: 1; overflow-y: auto; padding: 20px; }
        .message { margin-bottom: 16px; max-width: 80%; }
        .message.user { margin-left: auto; }
        .message.agent { margin-right: auto; }
        .message-content { padding: 12px 16px; border-radius: 12px; font-size: 14px; line-height: 1.5; white-space: pre-wrap; }
        .message.user .message-content { background: #38bdf8; color: #0f172a; border-bottom-right-radius: 4px; }
        .message.agent .message-content { background: #1e293b; border-bottom-left-radius: 4px; }
        .message-content { line-height: 1.6; }
        .message-content h1, .message-content h2, .message-content h3 { color: #f1f5f9; margin: 12px 0 8px 0; }
        .message-content h1 { font-size: 18px; }
        .message-content h2 { font-size: 16px; }
        .message-content h3 { font-size: 14px; }
        .message-content p { margin: 8px 0; }
        .message-content ul, .message-content ol { margin: 8px 0; padding-left: 20px; }
        .message-content li { margin: 4px 0; }
        .message-content table { border-collapse: collapse; margin: 12px 0; width: 100%; }
        .message-content th, .message-content td { border: 1px solid #334155; padding: 6px 10px; text-align: left; }
        .message-content th { background: #334155; }
        .message-content code { background: #0f172a; padding: 2px 6px; border-radius: 4px; font-family: monospace; }
        .message-content pre { background: #0f172a; padding: 12px; border-radius: 6px; overflow-x: auto; margin: 12px 0; }
        .message-content pre code { background: none; padding: 0; }
        .message-content blockquote { border-left: 3px solid #38bdf8; padding-left: 12px; margin: 12px 0; color: #94a3b8; }
        .message-content a { color: #38bdf8; }
        .message-content strong { color: #f1f5f9; }
        .message-time { font-size: 11px; color: #64748b; margin-top: 4px; padding: 0 4px; }
        .message.user .message-time { text-align: right; }
        .message.loading .message-content { opacity: 0.7; }
        .chat-input-area { padding: 16px 24px; border-top: 1px solid #334155; display: flex; gap: 12px; }
        .chat-input { flex: 1; padding: 12px 16px; border-radius: 8px; border: 1px solid #334155; background: #1e293b; color: #e2e8f0; font-size: 14px; resize: none; }
        .chat-input:focus { outline: none; border-color: #38bdf8; }
        .chat-send-btn { padding: 12px 24px; background: #38bdf8; color: #0f172a; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; }
        .chat-send-btn:hover { background: #0ea5e9; }
        .chat-send-btn:disabled { background: #475569; cursor: not-allowed; }
        .tabs-panel { width: 350px; background: #1e293b; border-left: 1px solid #334155; display: flex; flex-direction: column; overflow: hidden; }
        .tabs-header { display: flex; border-bottom: 1px solid #334155; }
        .tab-btn { flex: 1; padding: 12px; background: transparent; border: none; color: #64748b; font-size: 13px; cursor: pointer; border-bottom: 2px solid transparent; }
        .tab-btn:hover { color: #e2e8f0; }
        .tab-btn.active { color: #38bdf8; border-bottom-color: #38bdf8; }
        .tabs-content { flex: 1; overflow-y: auto; padding: 16px; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .card { background: #0f172a; border-radius: 8px; padding: 14px; margin-bottom: 12px; }
        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .card-title { font-size: 14px; font-weight: 600; color: #f1f5f9; }
        .card-meta { font-size: 12px; color: #64748b; margin-top: 4px; }
        .badge { padding: 3px 8px; border-radius: 4px; font-size: 11px; }
        .badge-orchestrator { background: #8b5cf6; color: #fff; }
        .badge-executor { background: #f59e0b; color: #000; }
        .badge-pending { background: #64748b; color: #fff; }
        .badge-in-progress { background: #f59e0b; color: #000; }
        .badge-completed { background: #22c55e; color: #fff; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); justify-content: center; align-items: center; z-index: 1000; }
        .modal.active { display: flex; }
        .modal-content { background: #1e293b; border-radius: 12px; padding: 24px; width: 500px; max-width: 90%; max-height: 90vh; overflow-y: auto; }
        .modal-title { font-size: 18px; margin-bottom: 20px; color: #f1f5f9; display: flex; justify-content: space-between; align-items: center; }
        .modal-title .close-btn { background: transparent; border: none; color: #64748b; cursor: pointer; font-size: 20px; }
        .modal-title .close-btn:hover { color: #e2e8f0; }
        .form-group { margin-bottom: 16px; }
        .form-label { display: block; margin-bottom: 6px; font-size: 13px; color: #94a3b8; }
        .form-input, .form-select, .form-textarea { width: 100%; padding: 10px; border-radius: 6px; border: 1px solid #334155; background: #0f172a; color: #e2e8f0; font-size: 14px; }
        .form-textarea { resize: vertical; min-height: 80px; }
        .form-input:focus, .form-select:focus, .form-textarea:focus { outline: none; border-color: #38bdf8; }
        .form-hint { font-size: 11px; color: #64748b; margin-top: 4px; }
        .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }
        .modal-actions .btn-danger { margin-right: auto; }
        .empty-state { text-align: center; padding: 40px 20px; color: #64748b; }
        .empty-state-icon { font-size: 48px; margin-bottom: 16px; }
        .toast { position: fixed; bottom: 20px; right: 20px; background: #22c55e; color: #fff; padding: 12px 20px; border-radius: 8px; display: none; z-index: 2000; }
        .toast.error { background: #ef4444; }
        .toast.show { display: block; }
        .connection-status { display: flex; align-items: center; gap: 6px; font-size: 12px; }
        .connection-status .dot { width: 8px; height: 8px; border-radius: 50%; }
        .connection-status.connected .dot { background: #22c55e; }
        .connection-status.disconnected .dot { background: #ef4444; }
        .no-orchestrator { background: #f59e0b; color: #000; padding: 8px 12px; border-radius: 6px; font-size: 13px; margin-bottom: 12px; }
        .file-item { padding: 8px 10px; border-radius: 4px; cursor: pointer; display: flex; align-items: center; gap: 8px; font-size: 13px; }
        .file-item:hover { background: #334155; }
        .file-item .icon { font-size: 16px; }
        .file-item .name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .file-item .size { font-size: 11px; color: #64748b; }
        .file-item.is-dir { color: #38bdf8; }
        .file-path-badge { background: #0f172a; padding: 4px 8px; border-radius: 4px; font-size: 11px; color: #94a3b8; word-break: break-all; margin-bottom: 12px; }
            </style>
</head>
<body>
    <div class="app-container">
        <div class="sidebar">
            <div class="sidebar-header">
                <h1>Agent Harness</h1>
                <div class="subtitle">智能体编排平台</div>
            </div>

            <div class="sidebar-section">
                <div class="sidebar-section-title">当前项目</div>
                <div id="current-project-info" style="font-size:13px;color:#94a3b8;padding:8px 0;">未选择项目</div>
            </div>

            <div class="sidebar-section" style="flex:1;overflow-y:auto;">
                <div class="sidebar-section-title">项目列表</div>
                <div id="projects-list"></div>
                <button class="btn-add" onclick="showProjectModal()">+ 新建项目</button>
            </div>

            <div class="sidebar-section">
                <button class="btn btn-primary btn-block" onclick="showProjectModal()">创建项目</button>
            </div>
        </div>

        <div class="main-content">
            <div class="top-bar">
                <div class="current-project">
                    <span id="project-name-display">未选择项目</span>
                    <span id="orchestrator-badge" class="orchestrator-badge" style="display:none;">Orchestrator</span>
                </div>
                <div class="connection-status connected" id="connection-status">
                    <span class="dot"></span>
                    <span id="status-text">Connected</span>
                </div>
            </div>

            <div class="chat-container">
                <div class="chat-messages" id="chat-messages">
                    <div class="empty-state">
                        <div class="empty-state-icon">💬</div>
                        <div>选择一个项目开始对话</div>
                        <div style="font-size:12px;margin-top:8px;">每个项目有一个 Orchestrator Agent 与您对话</div>
                    </div>
                </div>
                <div class="chat-input-area">
                    <textarea class="chat-input" id="chat-input" rows="1" placeholder="输入消息..." onkeydown="handleChatKeydown(event)" disabled></textarea>
                    <button class="chat-send-btn" id="send-btn" onclick="sendChatMessage()" disabled>发送</button>
                </div>
            </div>
        </div>

        <div class="tabs-panel">
            <div class="tabs-header">
                <button class="tab-btn active" data-tab="agents-tab">Agents</button>
                <button class="tab-btn" data-tab="tasks-tab">Tasks</button>
                <button class="tab-btn" data-tab="files-tab">Files</button>
                <button class="tab-btn" data-tab="info-tab">Info</button>
            </div>
            <div class="tabs-content">
                <div id="agents-tab" class="tab-content active">
                    <button class="btn btn-primary btn-block" onclick="showAgentModal()" style="margin-bottom:16px;">
                        + 创建 Agent
                    </button>
                    <div id="no-orchestrator-warning" style="display:none;" class="no-orchestrator">
                        项目暂无 Orchestrator，系统将自动创建一个
                    </div>
                    <div id="project-agents-list"></div>
                </div>

                <div id="tasks-tab" class="tab-content">
                    <button class="btn btn-primary btn-block" onclick="showTaskModal()" style="margin-bottom:16px;">
                        + 创建 Task
                    </button>
                    <div id="project-tasks-list"></div>
                </div>

                <div id="files-tab" class="tab-content">
                    <button class="btn btn-secondary btn-small" onclick="loadProjectFiles()" style="margin-bottom:12px;">🔄 刷新</button>
                    <div id="project-files-path" class="file-path-badge" style="display:none;"></div>
                    <div id="project-files-list"></div>
                </div>

                <div id="info-tab" class="tab-content">
                    <div id="project-info-content">
                        <div class="empty-state">选择一个项目查看详情</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Project Modal -->
    <div class="modal" id="project-modal">
        <div class="modal-content">
            <div class="modal-title">
                <span id="project-modal-title">创建项目</span>
                <button class="close-btn" onclick="closeModal('project-modal')">&times;</button>
            </div>
            <form id="project-form">
                <input type="hidden" name="project_id" id="project-id">
                <div class="form-group">
                    <label class="form-label">项目名称</label>
                    <input type="text" class="form-input" name="name" required placeholder="my-project">
                </div>
                <div class="form-group">
                    <label class="form-label">描述</label>
                    <input type="text" class="form-input" name="description" placeholder="项目描述...">
                </div>
                <div class="form-group">
                    <label class="form-label">Sandbox 路径</label>
                    <input type="text" class="form-input" name="sandbox_path" id="sandbox-path-input" placeholder="/path/to/sandbox">
                    <div class="form-hint" id="sandbox-path-hint">自动生成: {WORKTREE_BASE}/{project_name}/sandbox</div>
                </div>
                <div class="form-group">
                    <label class="form-label">上下文</label>
                    <textarea class="form-textarea" name="context" placeholder="项目上下文信息..."></textarea>
                </div>
                <div class="form-group">
                    <label class="form-label">记忆路径</label>
                    <input type="text" class="form-input" name="memory_path" id="memory-path-input" placeholder="/path/to/memory">
                    <div class="form-hint" id="memory-path-hint">自动生成: {WORKTREE_BASE_PATH}/{project_name}/.memory</div>
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn btn-danger" id="delete-project-btn" style="display:none;" onclick="deleteCurrentProject()">删除</button>
                    <button type="button" class="btn btn-secondary" onclick="closeModal('project-modal')">取消</button>
                    <button type="submit" class="btn btn-primary" id="project-submit-btn">创建</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Agent Modal -->
    <div class="modal" id="agent-modal">
        <div class="modal-content">
            <div class="modal-title">
                <span>创建 Agent</span>
                <button class="close-btn" onclick="closeModal('agent-modal')">&times;</button>
            </div>
            <form id="agent-form">
                <input type="hidden" name="project_id" id="agent-project-id">
                <div class="form-group">
                    <label class="form-label">名称</label>
                    <input type="text" class="form-input" name="name" required>
                </div>
                <div class="form-group">
                    <label class="form-label">类型</label>
                    <select class="form-select" name="agent_type" id="agent-type-select">
                        <option value="ORCHESTRATOR">Orchestrator</option>
                        <option value="TASK_EXECUTOR">Task Executor</option>
                        <option value="EVALUATOR">Evaluator</option>
                        <option value="PERSONAL_TWIN">Personal Twin</option>
                        <option value="DOMAIN_EXPERT">Domain Expert</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">描述</label>
                    <input type="text" class="form-input" name="description">
                </div>
                <div class="form-group">
                    <label class="form-label">系统提示词</label>
                    <textarea class="form-textarea" name="system_prompt" placeholder="Agent 的系统提示词..."></textarea>
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn btn-secondary" onclick="closeModal('agent-modal')">取消</button>
                    <button type="submit" class="btn btn-primary">创建</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Task Modal -->
    <div class="modal" id="task-modal">
        <div class="modal-content">
            <div class="modal-title">
                <span>创建 Task</span>
                <button class="close-btn" onclick="closeModal('task-modal')">&times;</button>
            </div>
            <form id="task-form">
                <input type="hidden" name="project_id" id="task-project-id">
                <div class="form-group">
                    <label class="form-label">主题</label>
                    <input type="text" class="form-input" name="subject" required>
                </div>
                <div class="form-group">
                    <label class="form-label">描述</label>
                    <input type="text" class="form-input" name="description">
                </div>
                <div class="form-group">
                    <label class="form-label">优先级</label>
                    <select class="form-select" name="priority">
                        <option value="1">Low</option>
                        <option value="2" selected>Normal</option>
                        <option value="3">High</option>
                        <option value="4">Critical</option>
                    </select>
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn btn-secondary" onclick="closeModal('task-modal')">取消</button>
                    <button type="submit" class="btn btn-primary">创建</button>
                </div>
            </form>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        const API_BASE = 'http://localhost:5555/api';
        const WORKTREE_BASE = '/Users/jackyfox/New_Smart_Agent_Harness_System/backend/ProjectSandbox';
        let currentProjectId = null;
        let currentOrchestratorId = null;
        let projects = [];
        let orchestratorId = null;

        async function api(method, endpoint, data = null) {
            const options = { method, headers: { 'Content-Type': 'application/json' } };
            if (data) options.body = JSON.stringify(data);
            const response = await fetch(API_BASE + endpoint, options);
            const result = await response.json();
            if (!response.ok && result.error) throw new Error(result.error);
            return result;
        }

        function showToast(message, isError = false) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = 'toast' + (isError ? ' error' : '') + ' show';
            setTimeout(() => toast.className = 'toast', 3000);
        }

        function closeModal(id) { document.getElementById(id).classList.remove('active'); }

        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                document.getElementById(btn.dataset.tab).classList.add('active');
            });
        });

        async function loadProjects() {
            try {
                const data = await api('GET', '/projects');
                projects = data.projects || [];
                renderProjectsList();
            } catch (e) {
                showToast('Failed to load projects', true);
            }
        }

        function renderProjectsList() {
            const container = document.getElementById('projects-list');
            if (projects.length === 0) {
                container.innerHTML = '<div style="font-size:12px;color:#64748b;padding:8px;">暂无项目</div>';
                return;
            }
            container.innerHTML = projects.map(p => `
                <div class="project-item ${p.id === currentProjectId ? 'active' : ''}" onclick="selectProject('${p.id}')">
                    <div class="name">
                        <span>${p.name}</span>
                        <div class="actions" onclick="event.stopPropagation();">
                            <button onclick="editProject('${p.id}')" title="编辑">✏️</button>
                            <button class="delete-btn" onclick="deleteProject('${p.id}')" title="删除">🗑️</button>
                        </div>
                    </div>
                    <div class="meta">${p.description || ''}</div>
                </div>
            `).join('');
        }

        async function selectProject(projectId) {
            currentProjectId = projectId;
            const project = projects.find(p => p.id === projectId);

            document.getElementById('project-name-display').textContent = project?.name || '未选择';
            document.getElementById('current-project-info').innerHTML = project ? `
                <strong>${project.name}</strong>
                <div style="font-size:12px;margin-top:4px;">${project.context || project.description || ''}</div>
            ` : '未选择项目';

            renderProjectsList();
            await loadProjectAgents();
            await loadProjectTasks();
            await loadProjectFiles();
            await loadProjectInfo();
            await loadOrCreateOrchestrator();
        }

        async function loadOrCreateOrchestrator() {
            if (!currentProjectId) return;

            const data = await api('GET', `/projects/${currentProjectId}/agents`);
            const agents = data.agents || [];
            const orch = agents.find(a => a.agent_type === 'ORCHESTRATOR');

            if (orch) {
                currentOrchestratorId = orch.id;
                orchestratorId = orch.id;
                document.getElementById('orchestrator-badge').style.display = 'inline';
                document.getElementById('no-orchestrator-warning').style.display = 'none';
                enableChat();
                loadChatHistory();
            } else {
                document.getElementById('no-orchestrator-warning').style.display = 'block';
                try {
                    const result = await api('POST', '/agents', {
                        name: 'orchestrator',
                        agent_type: 'ORCHESTRATOR',
                        description: 'Project orchestrator',
                        project_id: currentProjectId,
                        permission_level: 'ADMIN'
                    });
                    if (result.agent) {
                        currentOrchestratorId = result.agent.id;
                        orchestratorId = result.agent.id;
                        document.getElementById('orchestrator-badge').style.display = 'inline';
                        document.getElementById('no-orchestrator-warning').style.display = 'none';
                        enableChat();
                    }
                } catch (e) {
                    showToast('Failed to create orchestrator', true);
                }
            }

            await loadProjectAgents();
        }

        function enableChat() {
            document.getElementById('chat-input').disabled = false;
            document.getElementById('send-btn').disabled = false;
            document.getElementById('chat-messages').innerHTML = `
                <div class="message agent">
                    <div class="message-content">
                        你好！我是 ${projects.find(p => p.id === currentProjectId)?.name || '项目'} 的 Orchestrator。
                        有什么我可以帮助你的吗？
                    </div>
                    <div class="message-time">${new Date().toLocaleTimeString()}</div>
                </div>
            `;
        }

        async function loadChatHistory() {
            if (!currentOrchestratorId) return;
            try {
                const data = await api('GET', `/chat/history/${currentProjectId}/${currentOrchestratorId}`);
                const messages = data.messages || [];
                const container = document.getElementById('chat-messages');
                if (messages.length === 0) return;

                container.innerHTML = '';
                messages.forEach(msg => {
                    const role = msg.role === 'user' ? 'user' : 'agent';
                    const content = role === 'agent' ? marked.parse(msg.content) : escapeHtml(msg.content);
                    container.innerHTML += `
                        <div class="message ${role}">
                            <div class="message-content">${content}</div>
                            <div class="message-time">${new Date(msg.timestamp).toLocaleTimeString()}</div>
                        </div>
                    `;
                });
                container.scrollTop = container.scrollHeight;
            } catch (e) {
                console.error('Failed to load chat history:', e);
            }
        }

        function handleChatKeydown(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendChatMessage();
            }
        }

        async function sendChatMessage() {
            const input = document.getElementById('chat-input');
            const message = input.value.trim();
            if (!message || !currentOrchestratorId) return;

            const chatMessages = document.getElementById('chat-messages');

            chatMessages.innerHTML += `
                <div class="message user">
                    <div class="message-content">${escapeHtml(message)}</div>
                    <div class="message-time">${new Date().toLocaleTimeString()}</div>
                </div>
            `;
            input.value = '';
            chatMessages.scrollTop = chatMessages.scrollHeight;

            const loadingId = 'loading-' + Date.now();
            chatMessages.innerHTML += `
                <div class="message agent loading" id="${loadingId}">
                    <div class="message-content">正在思考...</div>
                    <div class="message-time"></div>
                </div>
            `;

            try {
                const result = await api('POST', '/chat/send', {
                    project_id: currentProjectId,
                    agent_id: currentOrchestratorId,
                    message: message
                });

                document.getElementById(loadingId)?.remove();

                chatMessages.innerHTML += `
                    <div class="message agent">
                        <div class="message-content">${marked.parse(result.response)}</div>
                        <div class="message-time">${new Date().toLocaleTimeString()}</div>
                    </div>
                `;
                chatMessages.scrollTop = chatMessages.scrollHeight;
            } catch (e) {
                document.getElementById(loadingId)?.remove();
                chatMessages.innerHTML += `
                    <div class="message agent">
                        <div class="message-content" style="color:#ef4444;">错误: ${escapeHtml(e.message)}</div>
                        <div class="message-time">${new Date().toLocaleTimeString()}</div>
                    </div>
                `;
                chatMessages.scrollTop = chatMessages.scrollHeight;
            }
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML.replace(/\n/g, '<br>');
        }

        function updatePathHints(projectName) {
            const sandboxHint = document.getElementById('sandbox-path-hint');
            const memoryHint = document.getElementById('memory-path-hint');
            if (projectName) {
                sandboxHint.textContent = `自动生成: ${WORKTREE_BASE}/${projectName}`;
                memoryHint.textContent = `自动生成: ${WORKTREE_BASE}/${projectName}/.memory`;
            } else {
                sandboxHint.textContent = `自动生成: ${WORKTREE_BASE}/{project_name}`;
                memoryHint.textContent = `自动生成: ${WORKTREE_BASE}/{project_name}/.memory`;
            }
        }

        function showProjectModal(project = null) {
            const form = document.getElementById('project-form');
            form.reset();
            document.getElementById('project-id').value = '';
            document.getElementById('project-modal-title').textContent = '创建项目';
            document.getElementById('project-submit-btn').textContent = '创建';
            document.getElementById('delete-project-btn').style.display = 'none';
            updatePathHints('');

            if (project) {
                document.getElementById('project-id').value = project.id;
                document.getElementById('project-modal-title').textContent = '编辑项目';
                document.getElementById('project-submit-btn').textContent = '保存';
                document.getElementById('delete-project-btn').style.display = 'block';
                document.querySelector('[name="name"]').value = project.name;
                document.querySelector('[name="description"]').value = project.description || '';
                document.querySelector('[name="sandbox_path"]').value = project.sandbox_path || '';
                document.querySelector('[name="context"]').value = project.context || '';
                document.querySelector('[name="memory_path"]').value = project.memory_path || '';
                updatePathHints(project.name);
            }

            document.getElementById('project-modal').classList.add('active');
        }

        function editProject(projectId) {
            const project = projects.find(p => p.id === projectId);
            if (project) showProjectModal(project);
        }

        async function deleteProject(projectId) {
            if (!confirm('确定要删除这个项目吗？此操作不可恢复。')) return;
            try {
                await api('DELETE', `/projects/${projectId}`);
                if (currentProjectId === projectId) {
                    currentProjectId = null;
                    currentOrchestratorId = null;
                    document.getElementById('orchestrator-badge').style.display = 'none';
                    document.getElementById('chat-messages').innerHTML = `
                        <div class="empty-state">
                            <div class="empty-state-icon">💬</div>
                            <div>选择一个项目开始对话</div>
                        </div>
                    `;
                    document.getElementById('chat-input').disabled = true;
                    document.getElementById('send-btn').disabled = true;
                }
                await loadProjects();
                showToast('项目已删除');
            } catch (err) {
                showToast(err.message || '删除失败', true);
            }
        }

        async function deleteCurrentProject() {
            if (currentProjectId) {
                await deleteProject(currentProjectId);
                closeModal('project-modal');
            }
        }

        document.getElementById('project-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            const data = Object.fromEntries(formData);
            const projectId = data.project_id;

            // Auto-fill paths if empty
            if (!data.sandbox_path) {
                data.sandbox_path = `${WORKTREE_BASE}/${data.name}/sandbox`;
            }
            if (!data.memory_path) {
                data.memory_path = `${WORKTREE_BASE}/${data.name}/.memory`;
            }

            try {
                if (projectId) {
                    const result = await api('PATCH', `/projects/${projectId}`, data);
                    if (result.project) {
                        closeModal('project-modal');
                        await loadProjects();
                        await selectProject(projectId);
                        showToast('项目已更新');
                    }
                } else {
                    const result = await api('POST', '/projects', data);
                    if (result.project) {
                        closeModal('project-modal');
                        await loadProjects();
                        await selectProject(result.project.id);
                        showToast('项目创建成功');
                    }
                }
            } catch (err) {
                showToast(err.message || '操作失败', true);
            }
        });

        document.querySelector('[name="name"]').addEventListener('input', (e) => {
            const projectId = document.getElementById('project-id').value;
            if (!projectId) {
                updatePathHints(e.target.value);
            }
        });

        function showAgentModal() {
            if (!currentProjectId) { showToast('请先选择一个项目', true); return; }
            document.getElementById('agent-form').reset();
            document.getElementById('agent-project-id').value = currentProjectId;
            document.getElementById('agent-modal').classList.add('active');
        }

        document.getElementById('agent-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            const data = Object.fromEntries(formData);
            try {
                const result = await api('POST', '/agents', data);
                if (result.agent) {
                    closeModal('agent-modal');
                    await loadProjectAgents();
                    showToast('Agent 创建成功');
                }
            } catch (err) {
                showToast(err.message || '创建失败', true);
            }
        });

        async function loadProjectAgents() {
            if (!currentProjectId) {
                document.getElementById('project-agents-list').innerHTML = '<div class="empty-state">选择项目后查看 Agents</div>';
                return;
            }
            try {
                const data = await api('GET', `/projects/${currentProjectId}/agents`);
                const agents = data.agents || [];
                const container = document.getElementById('project-agents-list');
                if (agents.length === 0) {
                    container.innerHTML = '<div class="empty-state">暂无 Agents</div>';
                    return;
                }
                container.innerHTML = agents.map(a => `
                    <div class="card">
                        <div class="card-header">
                            <span class="card-title">${a.name}</span>
                            <span class="badge badge-${a.agent_type.toLowerCase()}">${a.agent_type}</span>
                        </div>
                        <div class="card-meta">${a.description || ''}</div>
                    </div>
                `).join('');
            } catch (e) {
                showToast('Failed to load agents', true);
            }
        }

        function showTaskModal() {
            if (!currentProjectId) { showToast('请先选择一个项目', true); return; }
            document.getElementById('task-form').reset();
            document.getElementById('task-project-id').value = currentProjectId;
            document.getElementById('task-modal').classList.add('active');
        }

        document.getElementById('task-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            const data = Object.fromEntries(formData);
            data.priority = parseInt(data.priority);
            try {
                const result = await api('POST', '/tasks', data);
                if (result.task) {
                    closeModal('task-modal');
                    await loadProjectTasks();
                    showToast('Task 创建成功');
                }
            } catch (err) {
                showToast(err.message || '创建失败', true);
            }
        });

        async function loadProjectTasks() {
            if (!currentProjectId) {
                document.getElementById('project-tasks-list').innerHTML = '<div class="empty-state">选择项目后查看 Tasks</div>';
                return;
            }
            try {
                const data = await api('GET', `/projects/${currentProjectId}/tasks`);
                const tasks = data.tasks || [];
                const container = document.getElementById('project-tasks-list');
                if (tasks.length === 0) {
                    container.innerHTML = '<div class="empty-state">暂无 Tasks</div>';
                    return;
                }
                container.innerHTML = tasks.map(t => `
                    <div class="card">
                        <div class="card-header">
                            <span class="card-title">#${t.task_number} ${t.subject}</span>
                            <span class="badge badge-${t.status}">${t.status}</span>
                        </div>
                        <div class="card-meta">${t.description || ''}</div>
                    </div>
                `).join('');
            } catch (e) {
                showToast('Failed to load tasks', true);
            }
        }

        async function loadProjectFiles() {
            if (!currentProjectId) {
                document.getElementById('project-files-list').innerHTML = '<div class="empty-state">选择项目后查看文件</div>';
                document.getElementById('project-files-path').style.display = 'none';
                return;
            }
            try {
                const data = await api('GET', `/projects/${currentProjectId}/files`);
                const container = document.getElementById('project-files-list');
                const pathBadge = document.getElementById('project-files-path');

                if (data.path) {
                    pathBadge.textContent = data.path;
                    pathBadge.style.display = 'block';
                } else {
                    pathBadge.style.display = 'none';
                }

                if (!data.files || data.files.length === 0) {
                    container.innerHTML = '<div class="empty-state">暂无文件<br><small style="color:#64748b;">设置 sandbox_path 后将显示项目文件</small></div>';
                    return;
                }
                container.innerHTML = data.files.map(f => `
                    <div class="file-item ${f.is_dir ? 'is-dir' : ''}">
                        <span class="icon">${f.is_dir ? '📁' : '📄'}</span>
                        <span class="name" title="${f.path}">${f.name}</span>
                        ${f.size !== null ? `<span class="size">${formatSize(f.size)}</span>` : ''}
                    </div>
                `).join('');
            } catch (e) {
                document.getElementById('project-files-list').innerHTML = '<div class="empty-state">加载文件失败</div>';
            }
        }

        function formatSize(bytes) {
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
            return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
        }

        async function loadProjectInfo() {
            if (!currentProjectId) {
                document.getElementById('project-info-content').innerHTML = '<div class="empty-state">选择项目后查看详情</div>';
                return;
            }
            try {
                const data = await api('GET', `/projects/${currentProjectId}`);
                const project = data.project;
                if (!project) {
                    document.getElementById('project-info-content').innerHTML = '<div class="empty-state">项目未找到</div>';
                    return;
                }
                document.getElementById('project-info-content').innerHTML = `
                    <div class="card">
                        <div class="card-header"><span class="card-title">${project.name}</span></div>
                        <div class="card-meta">${project.description || '无描述'}</div>
                    </div>
                    <div class="card"><div class="card-title" style="margin-bottom:8px;">Sandbox 路径</div><div style="font-size:12px;color:#94a3b8;word-break:break-all;">${project.sandbox_path || '未设置'}</div></div>
                    <div class="card"><div class="card-title" style="margin-bottom:8px;">上下文</div><div style="font-size:12px;color:#94a3b8;white-space:pre-wrap;">${project.context || '未设置'}</div></div>
                    <div class="card"><div class="card-title" style="margin-bottom:8px;">记忆路径</div><div style="font-size:12px;color:#94a3b8;word-break:break-all;">${project.memory_path || '未设置'}</div></div>
                `;
            } catch (e) {
                showToast('Failed to load project info', true);
            }
        }

        // Initialize
        loadProjects();
    </script>
</body>
</html>
